<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>lite — usage</title>
<style>
  :root {
    --bg: #0b0d10; --panel: #14181d; --line: #232a32;
    --fg: #e6edf3; --muted: #8b98a5; --accent: #5ad19a; --accent2: #6aa6ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 24px; border-bottom: 1px solid var(--line);
  }
  header h1 { font-size: 16px; margin: 0; letter-spacing: .5px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .session { color: var(--muted); font-size: 12px; margin-left: auto; }
  main { padding: 24px; max-width: 1100px; margin: 0 auto; }
  .cards { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 24px; }
  .card.spend { border-color: var(--accent); }
  .card.spend .value { color: var(--accent); }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 16px; }
  .card .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .8px; }
  .card .value { font-size: 28px; font-weight: 600; margin-top: 6px; }
  section { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 18px; margin-bottom: 20px; }
  section h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin: 0 0 14px; }
  .bar-row { display: grid; grid-template-columns: 220px 1fr 200px; align-items: center; gap: 10px; margin-bottom: 8px; }
  .bar-track { background: #0b0d10; border-radius: 6px; height: 18px; overflow: hidden; }
  .bar-fill { background: linear-gradient(90deg, var(--accent2), var(--accent)); height: 100%; }
  .bar-row .name { color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-row .num { text-align: right; color: var(--muted); }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--line); white-space: nowrap; }
  th { color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; }
  td.num, th.num { text-align: right; }
  canvas { width: 100%; height: 220px; display: block; }
  .empty { color: var(--muted); padding: 20px 0; }
</style>
</head>
<body>
  <header>
    <span class="dot"></span>
    <h1>lite · usage</h1>
    <span class="session" id="session">—</span>
  </header>
  <main>
    <div class="cards">
      <div class="card spend"><div class="label">Spend</div><div class="value" id="c-spend">$0.00</div></div>
      <div class="card"><div class="label">Requests</div><div class="value" id="c-req">0</div></div>
      <div class="card"><div class="label">Input tokens</div><div class="value" id="c-in">0</div></div>
      <div class="card"><div class="label">Output tokens</div><div class="value" id="c-out">0</div></div>
      <div class="card"><div class="label">Cache read</div><div class="value" id="c-cache">0</div></div>
    </div>

    <section>
      <h2>Tokens over time (input / output per request)</h2>
      <canvas id="chart"></canvas>
    </section>

    <section>
      <h2>By model</h2>
      <div id="models"><div class="empty">No data yet…</div></div>
    </section>

    <section>
      <h2>Recent requests</h2>
      <table>
        <thead><tr>
          <th>time</th><th>model</th><th class="num">in</th><th class="num">out</th>
          <th class="num">cost</th><th class="num">ms</th><th class="num">code</th><th>path</th>
        </tr></thead>
        <tbody id="rows"><tr><td colspan="7" class="empty">No requests yet…</td></tr></tbody>
      </table>
    </section>
  </main>

<script>
const fmt = (n) => (n ?? 0).toLocaleString();
const money = (n) => '$' + (n ?? 0).toLocaleString(undefined, { minimumFractionDigits: (n && n < 1 ? 4 : 2), maximumFractionDigits: 4 });

function renderModels(by) {
  const el = document.getElementById('models');
  if (!by.length) { el.innerHTML = '<div class="empty">No data yet…</div>'; return; }
  const max = Math.max(1, ...by.map(m => m.cost_usd || 0));
  el.innerHTML = by.map(m => {
    const pct = ((m.cost_usd || 0) / max * 100).toFixed(1);
    return `<div class="bar-row">
      <div class="name" title="${m.model}">${m.model}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
      <div class="num">${money(m.cost_usd)} · ${fmt(m.input_tokens + m.output_tokens)} tok</div>
    </div>`;
  }).join('');
}

function renderRows(recent) {
  const el = document.getElementById('rows');
  if (!recent.length) { el.innerHTML = '<tr><td colspan="8" class="empty">No requests yet…</td></tr>'; return; }
  el.innerHTML = recent.map(r => {
    const t = (r.ts.split('T')[1] || r.ts).replace('Z','');
    return `<tr>
      <td>${t}</td><td>${r.model ?? '-'}</td>
      <td class="num">${fmt(r.input_tokens)}</td><td class="num">${fmt(r.output_tokens)}</td>
      <td class="num">${r.cost_usd ? money(r.cost_usd) : '-'}</td>
      <td class="num">${fmt(r.latency_ms)}</td><td class="num">${r.status}</td><td>${r.path}</td>
    </tr>`;
  }).join('');
}

function drawChart(series) {
  const cv = document.getElementById('chart');
  const dpr = window.devicePixelRatio || 1;
  const w = cv.clientWidth, h = cv.clientHeight;
  cv.width = w * dpr; cv.height = h * dpr;
  const ctx = cv.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);
  if (!series.length) return;
  const pad = 8;
  const max = Math.max(1, ...series.map(p => Math.max(p.input, p.output)));
  const n = series.length;
  const x = (i) => pad + (n === 1 ? 0 : (i / (n - 1)) * (w - 2 * pad));
  const y = (v) => h - pad - (v / max) * (h - 2 * pad);
  const plot = (key, color) => {
    ctx.beginPath();
    series.forEach((p, i) => { const px = x(i), py = y(p[key]); i ? ctx.lineTo(px, py) : ctx.moveTo(px, py); });
    ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.stroke();
  };
  plot('input', '#6aa6ff');
  plot('output', '#5ad19a');
}

async function tick() {
  try {
    const r = await fetch('/api/usage');
    const d = await r.json();
    document.getElementById('session').textContent = d.session || '—';
    document.getElementById('c-spend').textContent = money(d.cost_usd);
    document.getElementById('c-req').textContent = fmt(d.requests);
    document.getElementById('c-in').textContent = fmt(d.input_tokens);
    document.getElementById('c-out').textContent = fmt(d.output_tokens);
    document.getElementById('c-cache').textContent = fmt(d.cache_read_tokens);
    renderModels(d.by_model || []);
    renderRows(d.recent || []);
    drawChart(d.series || []);
  } catch (e) { /* proxy/dashboard may be momentarily unavailable */ }
}
tick();
setInterval(tick, 1000);
window.addEventListener('resize', tick);
</script>
</body>
</html>
