name: release

# Build prebuilt `lite` binaries and attach them to the GitHub Release when a
# v* tag is pushed. The installer (scripts/install-cli.sh) downloads these.
#
# Linux targets are static musl builds: a single self-contained binary that runs
# on Alpine (musl) AND glibc distros with zero runtime deps.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-13
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Ad-hoc re-sign macOS binaries so the kernel doesn't kill them after the
      # bytes round-trip through tar/curl on Apple Silicon. (codesign is a noop
      # condition on Linux runners.)
      - name: Build, archive, checksum, upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: lite
          target: ${{ matrix.target }}
          archive: lite-$target
          checksum: sha256
          codesign: "-"
          token: ${{ secrets.GITHUB_TOKEN }}
